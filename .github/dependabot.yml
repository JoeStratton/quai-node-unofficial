version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: "sunday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    groups:
      github-actions-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly
      day: "sunday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      docker-base-images:
        patterns:
          - "*"
