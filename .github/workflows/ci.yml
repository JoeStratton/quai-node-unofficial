name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1

  build-and-scan-image:
    needs: lint-and-security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: quai-node-unofficial:ci
          load: true
          push: false
          build-args: |
            GO_QUAI_VERSION=v0.51.1

      - name: Trivy image scan (OS packages, blocking)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: quai-node-unofficial:ci
          scanners: vuln
          vuln-type: os
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy image scan (go binary libs, advisory)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: quai-node-unofficial:ci
          scanners: vuln
          vuln-type: library
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 0
