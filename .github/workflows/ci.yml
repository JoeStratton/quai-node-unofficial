name: ci

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile

      # TODO: gitleaks-action currently emits Node 20 deprecation notices.
      # Keep official action for now; migrate to a Node 24-compatible release when available.
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.70.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1

  build-and-scan-image:
    needs: lint-and-security
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          tags: quai-node-unofficial:ci
          load: true
          push: false

      - name: Trivy image scan (OS packages, blocking)
        uses: aquasecurity/trivy-action@v0.70.0
        with:
          image-ref: quai-node-unofficial:ci
          scanners: vuln
          vuln-type: os
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Trivy image scan (go binary libs, advisory)
        uses: aquasecurity/trivy-action@v0.70.0
        with:
          image-ref: quai-node-unofficial:ci
          scanners: vuln
          vuln-type: library
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: 0
